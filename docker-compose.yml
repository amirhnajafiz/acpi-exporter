version: '3.9'

services:
  exporter:
    privileged: true  # needed by pyRAPL
    user: root  # needed by pyRAPL
    build:
      context: .
      dockerfile: build/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./configs/example.config.yaml:/app/config.yaml
      - ./configs/example.config.yaml:/app/src/config.yaml
      - /proc:/host/proc:ro
      # - /sys:/host/sys:ro
      # - /sys/class/powercap:/sys/class/powercap:ro
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_NAME=exporter-node
      - HOST_PROC=/host/proc
  
  prometheus:
    image: prom/prometheus
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"  # Prometheus UI

